version: '3.8'

services:
  web:
    image: pythonaws-web:latest
    container_name: django-app
    command: gunicorn configuration.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge