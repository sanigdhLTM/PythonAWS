version: '3'

services:
  web:
    build: .
    container_name: django_app
    volumes:
      - static_volume:/static
    expose:
      - 8000

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - static_volume:/static
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  static_volume: